<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroAdapt AI — Copilot</title>
  <link rel="stylesheet" href="styles/sidepanel.css" />
</head>
<body>
  <div class="na-panel">
    <header class="na-panel__header">
      <img src="icons/icon32.png" alt="NeuroAdapt AI logo" class="na-panel__logo" />
      <h1 class="na-panel__title">NeuroAdapt <span>AI</span></h1>
      <div class="na-panel__status-dot" id="na-panel-status-dot" data-status="idle"></div>
    </header>

    <!-- Current goal banner (shown while a task is active) -->
    <section class="na-panel__goal-card" id="na-goal-card" hidden>
      <p class="na-panel__goal-label">Current Goal</p>
      <p class="na-panel__goal-text" id="na-goal-text"></p>
    </section>

    <!-- Step guidance card -->
    <section class="na-panel__step-card" id="na-step-card">
      <p class="na-panel__step-label" id="na-step-progress">Current Step</p>
      <p class="na-panel__step-text" id="na-step-text">No active navigation.</p>

      <!-- Structured guidance (populated from workflow metadata) -->
      <div id="na-guidance" hidden>
        <div class="na-guidance__instruction" id="na-guidance-instruction"></div>
        <div class="na-guidance__why" id="na-guidance-why" hidden>
          <span class="na-guidance__why-label">Why?</span>
          <span id="na-guidance-why-text"></span>
        </div>
        <div class="na-guidance__next" id="na-guidance-next" hidden>
          <span class="na-guidance__next-label">After this</span>
          <span id="na-guidance-next-text"></span>
        </div>
      </div>
    </section>

    <!-- Highlight Again button (only shown when step is active) -->
    <button id="na-highlight-again-btn" class="na-panel__btn na-panel__btn--ghost" hidden>
      ↺ Highlight Again
    </button>

    <!-- Progress checklist -->
    <section class="na-panel__progress" id="na-progress-section">
      <h2 class="na-panel__section-title">Steps</h2>
      <ol class="na-panel__steps-list" id="na-steps-list">
        <!-- Populated dynamically -->
      </ol>
    </section>

    <!-- LLM explanation bubble (shown for non-workflow steps) -->
    <section class="na-panel__explanation" id="na-explanation-section" hidden>
      <div class="na-panel__bubble" id="na-explanation-bubble"></div>
    </section>

    <!-- Human-in-the-loop fallback -->
    <section class="na-panel__fallback" id="na-panel-fallback" hidden>
      <div class="na-panel__fallback-banner">
        <span class="na-panel__fallback-icon" aria-hidden="true">⚠️</span>
        <p id="na-panel-fallback-msg">I need your help. Please click the element on the page.</p>
      </div>
      <button id="na-panel-cancel-btn" class="na-panel__btn na-panel__btn--secondary">
        Cancel
      </button>
    </section>

    <!-- Goal input -->
    <section class="na-panel__input-section">
      <label for="na-panel-goal" class="na-panel__label">Goal</label>
      <textarea
        id="na-panel-goal"
        class="na-panel__textarea"
        placeholder="e.g. Register on UIDAI portal"
        rows="2"
      ></textarea>
      <button id="na-panel-start-btn" class="na-panel__btn na-panel__btn--primary">
        Start
      </button>
    </section>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
